name: Release Build & Versioning

# Dispara automaticamente em pushes para a branch 'release'.
# Pode ser acionado manualmente para escolher o tipo de incremento.
on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      bump:
        description: 'Tipo de incremento de versão'
        required: true
        default: build
        type: choice
        options:
          - build   # 1.0.0.N  → 1.0.0.(N+1)
          - patch   # 1.0.N.0  → 1.0.(N+1).0
          - minor   # 1.N.0.0  → 1.(N+1).0.0
          - major   # N.0.0.0  → (N+1).0.0.0

# Necessário para commitar o bump de versão e criar a release
permissions:
  contents: write

jobs:
  release:
    name: Bump version & build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # ── 3. Cache Gradle ────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 4. Android SDK path ────────────────────────────────────────────────
      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── 5. Bump version.properties ─────────────────────────────────────────
      - name: Bump version
        id: version
        run: |
          MAJOR=$(grep '^VERSION_MAJOR' version.properties | cut -d'=' -f2)
          MINOR=$(grep '^VERSION_MINOR' version.properties | cut -d'=' -f2)
          PATCH=$(grep '^VERSION_PATCH' version.properties | cut -d'=' -f2)
          BUILD=$(grep '^VERSION_BUILD' version.properties | cut -d'=' -f2)

          BUMP="${{ github.event.inputs.bump || 'build' }}"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0; PATCH=0; BUILD=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0; BUILD=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              BUILD=0
              ;;
            *)
              BUILD=$((BUILD + 1))
              ;;
          esac

          {
            echo "VERSION_MAJOR=${MAJOR}"
            echo "VERSION_MINOR=${MINOR}"
            echo "VERSION_PATCH=${PATCH}"
            echo "VERSION_BUILD=${BUILD}"
          } > version.properties

          VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"
          [ "$BUILD" -gt 0 ] && VERSION_NAME="${VERSION_NAME}.${BUILD}"
          VERSION_CODE=$(( MAJOR * 1000000 + MINOR * 10000 + PATCH * 100 + BUILD ))

          echo "version_name=${VERSION_NAME}"   >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}"   >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}"           >> "$GITHUB_OUTPUT"

          echo "### Versão calculada" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valor |"    >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|"            >> "$GITHUB_STEP_SUMMARY"
          echo "| versionName | \`${VERSION_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| versionCode | \`${VERSION_CODE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump type   | \`${BUMP}\`         |" >> "$GITHUB_STEP_SUMMARY"

      # ── 6. Build APK release ───────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease

      # ── 7. Commit e push do version.properties atualizado ──────────────────
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          # Só comita se houver mudança real; [skip ci] evita loop de trigger
          git diff --staged --quiet || \
            git commit -m "chore: bump version to ${{ steps.version.outputs.version_name }} [skip ci]"
          git push

      # ── 8. Tag de release ──────────────────────────────────────────────────
      - name: Tag release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Cria a tag somente se ela ainda não existir
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe, pulando."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      # ── 9. Upload do APK como artefato do workflow ─────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 10. GitHub Release com o APK anexado ───────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version_name }}"
          body: |
            ## Versão ${{ steps.version.outputs.version_name }}

            | Campo | Valor |
            |---|---|
            | versionName | `${{ steps.version.outputs.version_name }}` |
            | versionCode | `${{ steps.version.outputs.version_code }}` |
            | Branch | `${{ github.ref_name }}` |
            | Commit | `${{ github.sha }}` |
            | Disparado por | `${{ github.event_name }}` |
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
